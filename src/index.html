<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Excuse Generator</title>
</head>
<body class="bg-light">

    <audio id="bg-music" loop>
        <source src="ExcusesMusic.mp3" type="audio/mpeg">
    </audio>

    <div class="d-flex align-items-center justify-content-center vh-100">

        <div class="text-center p-5 bg-white rounded-3 shadow-sm border col-11 col-md-8 col-lg-6">
            
            <h2 class="text-muted mb-4 small text-uppercase fw-bold">OMG! You won't believe me but...</h2>
            
            <h3 id="excuse" class="display-6 fw-bold mb-5 text-dark"></h3>

            <button id="btn-generate" class="btn btn-primary btn-lg px-5 shadow-sm mb-4">Generate New Excuse</button>
            
            <h2 id="excuseLevel" class="text-start fs-6 mt-4 mb-0 opacity-90"></h2>
            
        </div>
    </div>

    <script src="/generateExcuse.js"></script>
</body>
</html>
